@if (!file()) {
  <!-- ── State A: Drop zone ──────────────────────────────────────────────── -->
  <div class="drop-page">
    <div class="drop-logo">
      <svg viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="8" fill="#1D6EE6"/>
        <path d="M8 32 L8 14 L20 8 L32 14 L32 32 Z" stroke="white" stroke-width="2" fill="none"/>
        <line x1="8" y1="14" x2="32" y2="14" stroke="white" stroke-width="1.5"/>
        <line x1="14" y1="14" x2="14" y2="32" stroke="white" stroke-width="1.5"/>
        <line x1="26" y1="14" x2="26" y2="32" stroke="white" stroke-width="1.5"/>
      </svg>
      <span>ESD Single Line Diagram</span>
    </div>

    <div class="drop-container">
      @if (parseError()) {
        <div class="error-banner">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.28 7.22a.75.75 0 00-1.06 1.06L8.94 10l-1.72 1.72a.75.75 0 101.06 1.06L10 11.06l1.72 1.72a.75.75 0 101.06-1.06L11.06 10l1.72-1.72a.75.75 0 00-1.06-1.06L10 8.94 8.28 7.22z" clip-rule="evenodd"/></svg>
          {{ parseError() }}
        </div>
      }
      <app-dropzone (filePicked)="onFilePicked($event)" />
    </div>
  </div>

} @else {
  <!-- ── State B: Loaded ────────────────────────────────────────────────────── -->
  <div class="app-loaded">

    <!-- Top bar -->
    <header class="top-bar">
      <div class="top-bar-left">
        <svg viewBox="0 0 24 24" fill="none" class="top-bar-icon">
          <rect width="24" height="24" rx="4" fill="#1D6EE6"/>
          <path d="M4 20 L4 10 L12 5 L20 10 L20 20 Z" stroke="white" stroke-width="1.5" fill="none"/>
          <line x1="4" y1="10" x2="20" y2="10" stroke="white" stroke-width="1"/>
          <line x1="9" y1="10" x2="9" y2="20" stroke="white" stroke-width="1"/>
          <line x1="15" y1="10" x2="15" y2="20" stroke="white" stroke-width="1"/>
        </svg>
        <span class="top-bar-filename">{{ file()!.name }}</span>
        @if (statsSummary) {
          <span class="top-bar-stats">{{ statsSummary }}</span>
        }
        @if (topology()?.hasUnsupportedPatterns) {
          <span class="top-bar-warn">⚠ Some components could not be rendered – unsupported topology.</span>
        }
      </div>
      <button class="top-bar-reload" (click)="loadDifferent()">
        Load different file
      </button>
    </header>

    <!-- Main content: SLD + properties panel -->
    <div class="content-area">
      @if (layout() && topology()) {
        <app-sld
          class="sld-host"
          [layout]="layout()!"
          [graph]="topology()!"
          [filename]="file()!.name"
          (nodeSelected)="onNodeSelected($event)"
        />
        <app-properties-panel [node]="selectedNode()" />
      }
    </div>

  </div>
}
