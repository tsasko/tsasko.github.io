<!-- ── Toolbar ─────────────────────────────────────────────────────────────── -->
<div class="toolbar">
  <div class="toolbar-left">
    <button class="tb-btn" title="Zoom Out" (click)="zoomOut()">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="9" r="6"/><line x1="5" y1="9" x2="13" y2="9"/><line x1="15" y1="15" x2="13" y2="13"/>
      </svg>
    </button>
    <span class="tb-zoom">{{ zoomPct() }}%</span>
    <button class="tb-btn" title="Zoom In" (click)="zoomIn()">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="9" r="6"/><line x1="9" y1="5" x2="9" y2="13"/><line x1="5" y1="9" x2="13" y2="9"/><line x1="15" y1="15" x2="13" y2="13"/>
      </svg>
    </button>
    <button class="tb-btn" title="Fit to viewport" (click)="fit()">FIT</button>
  </div>
  <div class="toolbar-right">
    <label class="tb-toggle">
      <input type="checkbox" [checked]="validationMode()" (change)="toggleValidation()" />
      Validation
    </label>
    <button class="tb-btn tb-export" title="Export PNG" (click)="exportPng()">
      <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M10 13V3M6 9l4 4 4-4"/><rect x="3" y="15" width="14" height="2" rx="1" fill="currentColor" stroke="none"/>
      </svg>
      Export PNG
    </button>
  </div>
</div>

<!-- ── Main area ─────────────────────────────────────────────────────────────── -->
<div class="main-area">

  <!-- Layer sidebar -->
  <div class="layer-sidebar">
    @for (layer of layers; track layer.name) {
      <div class="layer-row" [style.border-left-color]="layer.color">
        <span>{{ layer.label }}</span>
      </div>
    }
  </div>

  <!-- SVG canvas wrapper -->
  <div
    #canvasWrapper
    class="canvas-wrapper"
    [class.panning]="isPanning()"
    (wheel)="onWheel($event)"
    (mousedown)="onMouseDown($event)"
  >
    <svg
      #svgEl
      class="sld-svg"
      [attr.viewBox]="'0 0 ' + layout.totalWidth + ' ' + layout.totalHeight"
      [attr.width]="layout.totalWidth"
      [attr.height]="layout.totalHeight"
      [style.transform]="transform()"
      xmlns="http://www.w3.org/2000/svg"
    >
      <!-- Drop shadow filter -->
      <defs>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
          <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
        </filter>
        <filter id="shadow-selected" x="-10%" y="-10%" width="120%" height="130%">
          <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#1D6EE640"/>
        </filter>
      </defs>

      <!-- ── Busbars ────────────────────────────────────────────────────────── -->
      @for (bus of layout.busbars; track bus.ptId) {
        <g class="busbar-group">
          <line
            [attr.x1]="bus.x1" [attr.y1]="bus.y"
            [attr.x2]="bus.x2" [attr.y2]="bus.y"
            stroke="#0284C7" stroke-width="4" stroke-linecap="round"
          />
          <text
            [attr.x]="bus.x1" [attr.y]="bus.y - 8"
            font-size="10" fill="#0369A1" font-family="var(--font-mono)"
          >{{ bus.label }}</text>
        </g>
      }

      <!-- ── Wires ──────────────────────────────────────────────────────────── -->
      @for (wire of layout.wires; track wire.points) {
        <polyline
          [attr.points]="wire.points"
          [attr.stroke]="kindConfig(wire.kind).wire"
          fill="none"
          stroke-width="2"
          stroke-linejoin="round"
        />
      }

      <!-- ── Node cards ─────────────────────────────────────────────────────── -->
      @for (sn of layout.nodes; track sn.node.id) {
        <g
          class="node-card"
          [attr.transform]="'translate(' + (sn.cx - sn.width/2) + ',' + (sn.cy - sn.height/2) + ')'"
          (click)="selectNode($event, sn.node)"
        >
          <!-- Shadow -->
          <rect [attr.width]="sn.width" [attr.height]="sn.height" rx="6"
            fill="white" filter="url(#shadow)" opacity="0.5"/>

          <!-- Background -->
          <rect [attr.width]="sn.width" [attr.height]="sn.height" rx="6"
            [attr.fill]="kindConfig(sn.node.kind).bg"
            [attr.stroke]="kindConfig(sn.node.kind).stroke"
            stroke-width="1.5"
          />

          <!-- Left accent bar -->
          <rect width="3" [attr.height]="sn.height" rx="1.5"
            [attr.fill]="kindConfig(sn.node.kind).stroke"/>

          <!-- IEC Symbol -->
          <g [attr.transform]="'translate(10, ' + (sn.height/2) + ')'"
             [attr.stroke]="kindConfig(sn.node.kind).stroke">
            @switch (sn.node.kind) {
              @case ('gridConnection') {
                <!-- PCC: utility / grid symbol — circle + arrow -->
                <circle cx="0" cy="0" r="10" fill="none" stroke-width="1.5"/>
                <path d="M -5,-3 Q 0,5 5,-3" fill="none" stroke-width="1.5"/>
              }
              @case ('powerTransformer') {
                <!-- Transformer: two touching circles -->
                <circle cx="0" cy="-5" r="7" fill="none" stroke-width="1.5"/>
                <circle cx="0" cy="5" r="7" fill="none" stroke-width="1.5"/>
              }
              @case ('inverterTransformer') {
                <!-- Same but smaller -->
                <circle cx="0" cy="-5" r="6" fill="none" stroke-width="1.5"/>
                <circle cx="0" cy="5" r="6" fill="none" stroke-width="1.5"/>
              }
              @case ('inverterSetup') {
                <!-- Inverter: rectangle with ~ -->
                <rect x="-10" y="-10" width="20" height="20" rx="2"
                  [attr.fill]="kindConfig(sn.node.kind).bg" stroke-width="1.5"/>
                <path d="M -6,0 Q -3,-6 0,0 Q 3,6 6,0" fill="none" stroke-width="1.5"/>
              }
              @case ('array') {
                <!-- PV array: 2x2 cell grid -->
                <rect x="-10" y="-8" width="8" height="6" fill="none" stroke-width="1" rx="1"/>
                <rect x="2" y="-8" width="8" height="6" fill="none" stroke-width="1" rx="1"/>
                <rect x="-10" y="2" width="8" height="6" fill="none" stroke-width="1" rx="1"/>
                <rect x="2" y="2" width="8" height="6" fill="none" stroke-width="1" rx="1"/>
              }
            }
          </g>

          <!-- Tag pill -->
          <rect x="30" y="6" width="32" height="16" rx="3"
            [attr.fill]="kindConfig(sn.node.kind).tagBg"/>
          <text x="46" y="18" text-anchor="middle"
            font-size="9" font-weight="700" font-family="var(--font-mono)"
            [attr.fill]="kindConfig(sn.node.kind).tagFg"
          >{{ kindConfig(sn.node.kind).tag }}</text>

          <!-- Entity name -->
          <text
            [attr.x]="68" [attr.y]="sn.height / 2 - 4"
            font-size="11" font-weight="600" fill="#111827"
            font-family="system-ui, sans-serif"
          >{{ sn.node.name | slice:0:22 }}</text>

          <!-- Subtitle -->
          <text
            [attr.x]="68" [attr.y]="sn.height / 2 + 10"
            font-size="9" fill="#6B7280"
            font-family="var(--font-mono)"
          >{{ nodeSubtitle(sn) | slice:0:28 }}</text>

          <!-- Validation badges -->
          @if (validationMode()) {
            @for (badge of badgesFor(sn.node.id); track badge.message; let bi = $index) {
              <g [attr.transform]="'translate(' + (sn.width - 18 - bi * 20) + ', 4)'">
                <circle r="7" cx="0" cy="0"
                  [attr.fill]="badge.severity === 'warning' ? '#D97706' : '#2563EB'"/>
                <text x="0" y="4" text-anchor="middle"
                  font-size="9" font-weight="800" fill="white"
                >{{ badge.severity === 'warning' ? '!' : 'i' }}</text>
              </g>
            }
          }
        </g>
      }
    </svg>
  </div>
</div>
