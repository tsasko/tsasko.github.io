<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Parametric Wind Turbine</title>
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <script src="https://cdn.babylonjs.com/gui/babylon.gui.min.js"></script>
  <style>
    html, body, canvas { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(255,255,255,0.8); padding: 10px; border-radius: 8px; }
    #ui label { display: block; margin-top: 5px; }
  </style>
</head>
<body>
<div id="ui">
  <label>Base Diameter:
    <input id="baseDiameter" type="range" min="2" max="8" step="0.1" value="4">
    <input id="baseDiameterNumber" type="number" min="2" max="8" step="0.1" value="4">
  </label>
  <label>Top Diameter:
    <input id="topDiameter" type="range" min="2" max="4" step="0.1" value="1.5">
    <input id="topDiameterNumber" type="number" min="2" max="4" step="0.1" value="1.5">
  </label>
  <label>Height:
    <input id="height" type="range" min="60" max="150" step="1" value="80">
    <input id="heightNumber" type="number" min="60" max="150" step="1" value="80">
  </label>
  <label>Nacelle Ratio:
    <input id="nacelleRatio" type="range" min="1" max="10" step="0.1" value="5">
    <input id="nacelleRatioNumber" type="number" min="1" max="10" step="0.1" value="5">
  </label>
  <label>Blade Length:
    <input id="bladeLength" type="range" min="40" max="90" step="0.1" value="60">
    <input id="bladeLengthNumber" type="number" min="40" max="90" step="0.1" value="60">
  </label>
  <label>Sun Azimuth (°):
    <input id="sunAzimuth" type="range" min="0" max="360" step="1" value="135">
  </label>
  <label>Sun Elevation (°):
    <input id="sunElevation" type="range" min="0" max="90" step="1" value="45">
  </label>
</div>
<canvas id="renderCanvas"></canvas>
<script>
const canvas = document.getElementById("renderCanvas");
const engine = new BABYLON.Engine(canvas, true);

const createScene = () => {
  const scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color3(0.9, 0.9, 1);

  const camera = new BABYLON.ArcRotateCamera("Camera", -Math.PI / 2, Math.PI / 3, 100, new BABYLON.Vector3(0, 25, 0), scene);
  camera.attachControl(canvas, true);

  // Lighting
  const sunLightDirection = new BABYLON.Vector3(-1, -1, 0);
  const sun = new BABYLON.DirectionalLight("sun", sunLightDirection, scene);
  sun.position = new BABYLON.Vector3(100, 200, 100);
  sun.intensity = 3.2;
  function updateSunDirection() {
    const azimuthDeg = parseFloat(document.getElementById("sunAzimuth").value);
    const elevationDeg = parseFloat(document.getElementById("sunElevation").value);
    const azimuth = BABYLON.Angle.FromDegrees(azimuthDeg).radians();
    const elevation = BABYLON.Angle.FromDegrees(elevationDeg).radians();
    const x = Math.cos(elevation) * Math.sin(azimuth);
    const y = Math.sin(elevation);
    const z = Math.cos(elevation) * Math.cos(azimuth);
    sun.direction.set(-x, -y, -z);
  }

  const hemiLight = new BABYLON.HemisphericLight("hemiLight", new BABYLON.Vector3(0, 1, 0), scene);
  hemiLight.intensity = 0.9;

  const ground = BABYLON.MeshBuilder.CreateGround("ground", { width: 1800, height: 1800 }, scene);
  ground.position.y = 0;
  const groundTexture = new BABYLON.Texture("ground1.jpg", scene);
  groundTexture.uScale = 1;
  groundTexture.vScale = 1;

  const groundMat = new BABYLON.StandardMaterial("groundMat", scene);
  groundMat.diffuseTexture = groundTexture;
  groundMat.specularColor = new BABYLON.Color3(0, 0, 0);
  // groundMat.diffuseColor = new BABYLON.Color3(0.8, 0.8, 0.8);
  ground.material = groundMat;
  ground.receiveShadows = true;

  let turbineBody, nacelle, rotor, blades = [];
  let rotorGroup;
  let shadowGenerator;

  // All dimensions are considered in meters.

  function createTurbine(baseDiameter, topDiameter, height, nacelleRatio, bladeLength) {
    if (turbineBody) turbineBody.dispose();
    if (nacelle) nacelle.dispose();
    if (rotor) rotor.dispose();
    if (rotorGroup) rotorGroup.dispose();
    blades.forEach(b => b.dispose());
    blades = [];

    // Tower
    turbineBody = BABYLON.MeshBuilder.CreateCylinder("tower", {
      diameterTop: topDiameter,
      diameterBottom: baseDiameter,
      height: height,
      tessellation: 24
    }, scene);
    turbineBody.position.y = height / 2;

    // Base nacelle proportions in meters
    const nacelleBaseWidth = topDiameter * 1.5;
    const nacelleBaseHeight = topDiameter * 1.5;
    const nacelleBaseDepth = topDiameter * 5;

    // Scale nacelle dimensions by nacelleRatio parameter
    const nacelleWidth = nacelleBaseWidth * nacelleRatio / 3;
    const nacelleHeight = nacelleBaseHeight * nacelleRatio / 3;
    const nacelleDepth = nacelleBaseDepth * nacelleRatio / 3;

    nacelle = BABYLON.MeshBuilder.CreateBox("nacelle", {
      width: nacelleWidth,
      height: nacelleHeight,
      depth: nacelleDepth
    }, scene);
    nacelle.position.y = height;
    nacelle.position.z = 0;
    nacelle.material = new BABYLON.StandardMaterial("nacelleMat", scene);
    nacelle.material.diffuseColor = new BABYLON.Color3(0.98, 0.98, 0.98);

    const rotorDiameter = Math.min(nacelleHeight, nacelleWidth);
    const rotorLength = topDiameter * 0.8;

    rotorGroup = new BABYLON.TransformNode("rotorGroup", scene);
    rotorGroup.position.y = height;
    rotorGroup.position.z = -nacelleDepth / 2 - rotorLength / 2;

    rotor = BABYLON.MeshBuilder.CreateCylinder("rotor", {
      diameter: rotorDiameter,
      height: rotorLength,
      tessellation: 32
    }, scene);
    rotor.rotation.x = Math.PI / 2;
    rotor.position = BABYLON.Vector3.Zero();
    rotor.parent = rotorGroup;

    // Shared material for tower, rotor, and nacelle
    const sharedMat = new BABYLON.StandardMaterial("sharedMat", scene);
    sharedMat.diffuseTexture = new BABYLON.Texture("textures/Wallpaper001A_1K-JPG_Color.jpg", scene);
    sharedMat.diffuseTexture.uScale = 5;
    sharedMat.diffuseTexture.vScale = 5;
    sharedMat.bumpTexture = new BABYLON.Texture("textures/Wallpaper001A_1K-JPG_NormalGL.jpg", scene);
    sharedMat.bumpTexture.uScale = 5;
    sharedMat.bumpTexture.vScale = 5;
    sharedMat.specularTexture = new BABYLON.Texture("textures/Wallpaper001A_1K-JPG_Roughness.jpg", scene);
    sharedMat.specularTexture.uScale = 5;
    sharedMat.specularTexture.vScale = 5;
    sharedMat.specularPower = 16;
    sharedMat.useGlossinessFromSpecularMapAlpha = false;
    sharedMat.ambientColor = new BABYLON.Color3(1, 1, 1);
    sharedMat.specularColor = new BABYLON.Color3(0.2, 0.2, 0.2);

    turbineBody.material = sharedMat;
    rotor.material = sharedMat;
    nacelle.material = sharedMat;

    const bladeMat = new BABYLON.StandardMaterial("bladeMat", scene);
    bladeMat.diffuseColor = sharedMat.diffuseColor;
    bladeMat.alpha = 1;

    // Blades - 3 vertical, radiating from rotor center
    for (let i = 0; i < 3; i++) {
      const angle = i * (2 * Math.PI / 3);
      const blade = BABYLON.MeshBuilder.CreateBox("blade", {
        width: bladeLength,
        height: rotorDiameter * 0.8,
        depth: rotorDiameter * 0.1
      }, scene);
      blade.position = BABYLON.Vector3.Zero();
      blade.rotation.z = angle;
      blade.translate(BABYLON.Axis.X, bladeLength / 2, BABYLON.Space.LOCAL);
      blade.material = bladeMat;
      blade.parent = rotorGroup;
      blades.push(blade);
    }

    shadowGenerator = new BABYLON.ShadowGenerator(1024, sun);
    shadowGenerator.useBlurExponentialShadowMap = true;
    shadowGenerator.blurKernel = 32;
    shadowGenerator.addShadowCaster(rotor);
    blades.forEach(blade => shadowGenerator.addShadowCaster(blade));
    // Ensure turbine body and nacelle cast shadows
    shadowGenerator.addShadowCaster(turbineBody);
    shadowGenerator.addShadowCaster(nacelle);
    turbineBody.receiveShadows = true;
    nacelle.receiveShadows = true;
  }

  // Initial turbine
  createTurbine(4, 0.5, 50, 7, 30);

  function update() {
    const baseDiameter = parseFloat(document.getElementById("baseDiameter").value);
    const topDiameter = parseFloat(document.getElementById("topDiameter").value);
    const height = parseFloat(document.getElementById("height").value);
    const nacelleRatio = parseFloat(document.getElementById("nacelleRatio").value);
    const bladeLength = parseFloat(document.getElementById("bladeLength").value);
    createTurbine(baseDiameter, topDiameter, height, nacelleRatio, bladeLength);
  }

  function syncInput(id) {
    const slider = document.getElementById(id);
    const number = document.getElementById(id + "Number");

    slider.addEventListener("input", () => {
      number.value = slider.value;
      update();
    });
    number.addEventListener("input", () => {
      slider.value = number.value;
      update();
    });
  }
  ["baseDiameter", "topDiameter", "height", "nacelleRatio", "bladeLength"].forEach(syncInput);

  scene.registerBeforeRender(() => {
    if (rotorGroup) {
      rotorGroup.rotate(BABYLON.Axis.Z, 0.05, BABYLON.Space.LOCAL);
    }
  });

  ["sunAzimuth", "sunElevation"].forEach(id => {
    document.getElementById(id).addEventListener("input", updateSunDirection);
  });
  updateSunDirection();
  return scene;
};

const scene = createScene();
engine.runRenderLoop(() => scene.render());
window.addEventListener("resize", () => engine.resize());
</script>
</body>
</html>
